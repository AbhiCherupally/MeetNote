version: "3.8"

services:
  app:
    build: .
    ports:
      - "10000:10000"
    environment:
      - NODE_ENV=development
      - PORT=10000
      - JWT_SECRET=your-local-jwt-secret-key
      - OPENROUTER_API_KEY=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
      - ASSEMBLYAI_API_KEY=598c0c5952444246ba2c1af3eb010d0b
      - CORS_ORIGIN=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - .:/app
      - /app/node_modules