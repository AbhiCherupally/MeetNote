<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Outer border -->
  <rect x="1" y="1" width="14" height="14" fill="white" stroke="black" stroke-width="1"/>
  
  <!-- MEET section (black background) -->
  <rect x="1.5" y="1.5" width="5.5" height="13" fill="black"/>
  
  <!-- NOTES section is already white -->
  
  <!-- Text for 16px - just M and N -->
  <text x="4.25" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">M</text>
  <text x="11" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="black">N</text>
</svg>