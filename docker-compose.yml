version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=development
      - ASSEMBLYAI_API_KEY=598c0c5952444246ba2c1af3eb010d0b
      - JWT_SECRET_KEY=dev_secret_key_12345
      - DATABASE_URL=postgresql://postgres:password@db:5432/meetnote
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - meetnote-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=meetnote
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meetnote-network

  # Optional: Redis for session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - meetnote-network

volumes:
  postgres_data:

networks:
  meetnote-network:
    driver: bridge