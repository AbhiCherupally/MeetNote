# Netlify Deployment Configuration for Next.js

[build]
  # Base directory for build
  base = "frontend"
  
  # Build Command - Next.js build
  command = "npm install && npm run build"
  
  # Publish Directory for Next.js
  publish = ".next"

  # Environment Variables
  [build.environment]
    NEXT_PUBLIC_API_URL = "https://meetnote-backend.onrender.com"
    NODE_ENV = "production"
  
# No redirects needed for static export - Netlify serves files directly

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"