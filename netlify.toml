# Netlify Deployment Configuration for Next.js

[build]
  # Base directory for build
  base = "frontend"
  
  # Build Command - Next.js build
  command = "npm install && npm run build"
  
  # Publish Directory - relative to base directory
  publish = "out"

  # Environment Variables
  [build.environment]
    NEXT_PUBLIC_API_URL = "https://meetnote-backend.onrender.com"
    NODE_ENV = "production"

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  
# No redirects needed for static export - Netlify serves files directly

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"