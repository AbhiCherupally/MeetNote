# Netlify Deployment Configuration for MeetNote

[build]
  # Base directory (where to run build commands)
  base = "frontend"
  
  # Build Command - ensure dependencies are installed first
  command = "npm ci && npm run build"
  
  # Publish Directory for Next.js static export (relative to base)
  publish = "out"

  # Environment Variables
  [build.environment]
    NEXT_PUBLIC_API_URL = "https://meetnote.onrender.com"
    NODE_ENV = "production"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"