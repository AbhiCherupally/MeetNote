services:
  - type: web
    name: meetnote-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ASSEMBLYAI_API_KEY
        value: 598c0c5952444246ba2c1af3eb010d0b
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: meetnote
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    
databases:
  - name: meetnote
    databaseName: meetnote
    user: meetnote_user
    plan: free
    region: oregon
