services:
  - type: web
    name: meetnote-python-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000
      - key: ASSEMBLYAI_API_KEY
        sync: false
    scaling:
      minInstances: 1
      maxInstances: 2